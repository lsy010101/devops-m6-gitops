apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 3
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/lsy010101/devops-m6-backend:8e338b4c10ec6a378ebf37f27e639a718cc90aa7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          volumeMounts:
            - name: backend-templates
              mountPath: /app/templates/register.html
              subPath: register.html
            - name: backend-templates
              mountPath: /app/templates/login.html
              subPath: login.html
            - name: backend-templates
              mountPath: /app/templates/dashboard.html
              subPath: dashboard.html
          env:
            - name: MONGO_URI
              value: mongodb://mongo:27017/bank_app
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: secret-key
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: backend-templates
          configMap:
            name: backend-templates
